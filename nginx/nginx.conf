events {
    worker_connections 1024;
}

http {
    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name ledgerly-kit.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name ledgerly-kit.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/ledgerly-kit.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ledgerly-kit.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
