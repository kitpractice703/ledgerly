<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledgerly - 회원가입</title>
    <link rel="icon" type="image/png" href="/favicon.png"/>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center;
               align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .box { background: white; padding: 40px; border-radius: 8px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 360px; }
        h2 { margin-bottom: 24px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 16px;
                border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2196F3;
                 color: white; border: none; border-radius: 4px; cursor: pointer; }
        .link { text-align: center; margin-top: 16px; }
        .error { color: red; font-size: 14px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>회원가입</h2>

    <div th:if="${errors}">
        <p class="error" th:each="err : ${errors}" th:text="${err.defaultMessage}"></p>
    </div>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/register}" method="post">
        <input type="text" name="username" placeholder="이름" required/>
        <input type="email" name="email" placeholder="이메일" required/>
        <input type="password" name="password" placeholder="비밀번호" required/>
        <button type="submit">가입하기</button>
    </form>

    <div class="link">
        <a th:href="@{/login}">로그인으로 돌아가기</a>
    </div>
</div>
</body>
</html>
