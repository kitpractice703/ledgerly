<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledgerly - 내역 수정</title>
    <link rel="icon" type="image/png" href="/favicon.png"/>
    <style>
        body { font-family: sans-serif; background: #f5f5f5;
               display: flex; justify-content: center; padding: 40px 0; }
        .box { background: white; padding: 40px; border-radius: 8px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 420px; }
        h2 { margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 10px; margin-bottom: 16px;
                        border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2196F3;
                 color: white; border: none; border-radius: 4px; cursor: pointer; }
        .back { display: block; text-align: center; margin-top: 16px; color: #666; }
        .error { color: red; font-size: 14px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>거래 내역 수정</h2>

    <div th:if="${errors}">
        <p class="error" th:each="err : ${errors}" th:text="${err.defaultMessage}"></p>
    </div>

    <form th:action="@{/transactions/{id}/update(id=${transaction.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label>구분</label>
        <select name="type">
            <option value="EXPENSE" th:selected="${transaction.type == 'EXPENSE'}">지출</option>
            <option value="INCOME"  th:selected="${transaction.type == 'INCOME'}">수입</option>
        </select>

        <label>카테고리</label>
        <select name="categoryId">
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:selected="${cat.id == transaction.category.id}"
                    th:text="${cat.name}">
            </option>
        </select>

        <label>금액</label>
        <input type="number" name="amount" th:value="${transaction.amount}" min="1" required/>

        <label>날짜</label>
        <input type="date" name="transactionDate" th:value="${transaction.transactionDate}" required/>

        <label>메모 (선택)</label>
        <input type="text" name="description" th:value="${transaction.description}" placeholder="메모 입력"/>

        <button type="submit">저장</button>
    </form>

    <a th:href="@{/dashboard}" class="back">← 대시보드로 돌아가기</a>
</div>
</body>
</html>
