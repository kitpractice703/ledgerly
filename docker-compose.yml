services:

  db:
    image: mariadb:10.11
    container_name: ledgerly-db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ledgerly
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql  # 컨테이너 재시작 시에도 데이터 유지
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ledgerly-app
    depends_on:
      db:
        condition: service_healthy  # DB 초기화 완료 후 앱 기동 (단순 depends_on은 시작 순서만 보장)
    environment:
      DB_URL: jdbc:mariadb://db:3306/ledgerly?serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    # 포트 미노출 — 외부 접근은 Nginx를 통해서만 허용

  nginx:
    image: nginx:alpine
    container_name: ledgerly-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Let's Encrypt 인증서 마운트
    depends_on:
      - app

volumes:
  mariadb_data:
